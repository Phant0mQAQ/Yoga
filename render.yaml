services:
  - type: web
    name: yomi-yoga-api
    runtime: node
    region: singapore
    plan: free
    numInstances: 1
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: staging
      - key: APP_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: STRIPE_MERCHANT_IDENTIFIER
        value: merchant.com.yomiyoga.studio
